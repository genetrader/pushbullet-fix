<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>People - Pushbullet</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: white;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        .message {
            text-align: center;
            padding: 20px;
            max-width: 350px;
        }

        .message h3 {
            color: #4ab367;
            margin-bottom: 15px;
        }

        .message p {
            color: #666;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            background: #4ab367;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover {
            background: #3da558;
        }

        button.secondary {
            background: #e0e0e0;
            color: #333;
        }

        button.secondary:hover {
            background: #d0d0d0;
        }

        .iframe-container {
            width: 100%;
            height: 100%;
            display: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="message">
            <h3>Pushbullet People</h3>
            <p>Due to browser security restrictions, we can't embed the Pushbullet People page directly.</p>
            <p>You can either open Pushbullet in a new tab or try the simplified people view.</p>
            <div class="button-group">
                <button id="openPushbulletBtn">Open Pushbullet People</button>
                <button id="useSimpleViewBtn" class="secondary">Use Simple View</button>
            </div>
        </div>
    </div>

    <div class="iframe-container" id="iframeContainer">
        <iframe id="simpleFrame" src="people.html"></iframe>
    </div>

    <script src="people-simple.js"></script>
</body>
</html>
