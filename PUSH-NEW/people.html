<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>People - Pushbullet</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100%;
        }

        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid #e0e0e0;
            overflow-y: auto;
        }

        .main-content {
            flex: 1;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #4ab367;
        }

        .add-friend-btn {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background: #4ab367;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-friend-btn:hover {
            background: #3da558;
        }

        .people-list {
            padding: 10px;
        }

        .person-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .person-item:hover {
            background: #f0f0f0;
        }

        .person-item.selected {
            background: #e8f5e9;
        }

        .person-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #4ab367;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            margin-right: 12px;
        }

        .person-info {
            flex: 1;
        }

        .person-name {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .person-email {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        .empty-state {
            text-align: center;
            color: #666;
        }

        .empty-state img {
            width: 120px;
            height: 120px;
            opacity: 0.3;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #333;
        }

        .empty-state p {
            font-size: 14px;
            line-height: 1.5;
            max-width: 300px;
            margin: 0 auto;
        }

        .chat-view {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid #e0e0e0;
            background: white;
            display: flex;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #fafafa;
        }

        .chat-input {
            padding: 15px;
            border-top: 1px solid #e0e0e0;
            background: white;
        }

        .input-group {
            display: flex;
            align-items: center;
        }

        .message-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        .send-btn {
            margin-left: 10px;
            padding: 8px 15px;
            background: #4ab367;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .send-btn:hover {
            background: #3da558;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="header">
                <h2>People</h2>
                <button class="add-friend-btn" onclick="addFriend()">
                    + Add a Friend
                </button>
            </div>
            <div class="people-list" id="peopleList">
                <!-- People will be loaded here -->
            </div>
        </div>
        <div class="main-content" id="mainContent">
            <div class="empty-state">
                <img src="chip_person.png" alt="People">
                <h3>Connect with Friends</h3>
                <p>Add friends to start sharing links, files, and messages instantly across all your devices.</p>
            </div>
            <div class="chat-view" id="chatView">
                <div class="chat-header" id="chatHeader">
                    <!-- Selected person info -->
                </div>
                <div class="chat-messages" id="chatMessages">
                    <!-- Messages -->
                </div>
                <div class="chat-input">
                    <div class="input-group">
                        <input type="text" class="message-input" placeholder="Type a message..." id="messageInput">
                        <button class="send-btn" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize with some demo data or load from extension storage
        let friends = [];
        let selectedFriend = null;

        function loadFriends() {
            // Try to get friends from the extension's local storage
            if (window.chrome && chrome.runtime) {
                chrome.runtime.sendMessage({ action: 'getState' }, function(response) {
                    if (response && response.local && response.local.chats) {
                        friends = response.local.chats;
                        renderFriends();
                    } else {
                        // Show demo data if no real data
                        showDemoData();
                    }
                });
            } else {
                showDemoData();
            }
        }

        function showDemoData() {
            friends = [
                { name: 'John Doe', email: 'john@example.com', with: { email_normalized: 'john@example.com' } },
                { name: 'Jane Smith', email: 'jane@example.com', with: { email_normalized: 'jane@example.com' } }
            ];
            renderFriends();
        }

        function renderFriends() {
            const peopleList = document.getElementById('peopleList');
            peopleList.innerHTML = '';

            if (friends.length === 0) {
                peopleList.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">No friends yet</div>';
                return;
            }

            friends.forEach(friend => {
                const item = document.createElement('div');
                item.className = 'person-item';
                item.onclick = () => selectFriend(friend);

                const avatar = document.createElement('div');
                avatar.className = 'person-avatar';
                avatar.textContent = (friend.name || friend.email || 'U')[0].toUpperCase();

                const info = document.createElement('div');
                info.className = 'person-info';

                const name = document.createElement('div');
                name.className = 'person-name';
                name.textContent = friend.name || friend.with?.email_normalized || friend.email || 'Unknown';

                const email = document.createElement('div');
                email.className = 'person-email';
                email.textContent = friend.with?.email_normalized || friend.email || '';

                info.appendChild(name);
                if (email.textContent) {
                    info.appendChild(email);
                }

                item.appendChild(avatar);
                item.appendChild(info);
                peopleList.appendChild(item);
            });
        }

        function selectFriend(friend) {
            selectedFriend = friend;

            // Update UI
            document.querySelectorAll('.person-item').forEach(item => {
                item.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');

            // Show chat view
            document.querySelector('.empty-state').style.display = 'none';
            document.getElementById('chatView').style.display = 'flex';

            // Update chat header
            const chatHeader = document.getElementById('chatHeader');
            chatHeader.innerHTML = `
                <div style="display: flex; align-items: center;">
                    <div class="person-avatar" style="margin-right: 12px;">
                        ${(friend.name || friend.email || 'U')[0].toUpperCase()}
                    </div>
                    <div>
                        <div class="person-name">${friend.name || friend.with?.email_normalized || 'Unknown'}</div>
                        <div class="person-email" style="font-size: 12px;">${friend.with?.email_normalized || ''}</div>
                    </div>
                </div>
            `;

            // Load chat messages if available
            loadChatMessages(friend);
        }

        function loadChatMessages(friend) {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">Start a conversation!</div>';
        }

        function addFriend() {
            // Open Pushbullet website to add friend
            if (window.chrome && chrome.tabs) {
                chrome.tabs.create({ url: 'https://www.pushbullet.com/#people/new' });
            } else {
                window.open('https://www.pushbullet.com/#people/new', '_blank');
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (message && selectedFriend) {
                // Send via extension's pb.sendPush
                if (window.chrome && chrome.runtime) {
                    chrome.runtime.sendMessage({
                        action: 'sendPush',
                        data: {
                            type: 'note',
                            body: message,
                            email: selectedFriend.with?.email_normalized || selectedFriend.email
                        }
                    });
                }

                // Clear input
                input.value = '';

                // Show message in UI (optimistic update)
                const chatMessages = document.getElementById('chatMessages');
                if (chatMessages.querySelector('div[style*="text-align: center"]')) {
                    chatMessages.innerHTML = '';
                }

                const messageEl = document.createElement('div');
                messageEl.style.cssText = 'background: #4ab367; color: white; padding: 10px 15px; border-radius: 18px; margin-bottom: 10px; max-width: 70%; margin-left: auto; width: fit-content;';
                messageEl.textContent = message;
                chatMessages.appendChild(messageEl);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        // Handle Enter key in message input
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('messageInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            // Load friends on page load
            loadFriends();
        });
    </script>
</body>
</html>
