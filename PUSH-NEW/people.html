<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>People - Pushbullet</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: white;
            color: #333;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .container h2 {
            color: #4ab367;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .container p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .open-pushbullet-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #4ab367;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 16px;
            transition: background 0.2s;
            cursor: pointer;
            border: none;
        }

        .open-pushbullet-btn:hover {
            background: #3da558;
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="chip_person.png" alt="People" class="icon">
        <h2>Pushbullet People</h2>
        <p>Manage your friends and contacts on the Pushbullet website.</p>
        <button id="openPushbulletBtn" class="open-pushbullet-btn">Open Pushbullet People</button>
    </div>

    <script src="people.js"></script>
</body>
</html>
