<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>People - Pushbullet</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: #4ab367;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4ab367;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        .error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: #666;
            display: none;
            max-width: 300px;
        }

        .error-message h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .error-message button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #4ab367;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .error-message button:hover {
            background: #3da558;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Loading Pushbullet People...</p>
    </div>

    <div class="error-message" id="errorMessage">
        <h3>Unable to Load People</h3>
        <p>Please make sure you're signed in to Pushbullet.</p>
        <button id="openPushbulletBtn">Open Pushbullet</button>
    </div>

    <iframe
        id="pushbulletFrame"
        src="https://www.pushbullet.com/#people">
    </iframe>

    <script src="people-frame.js"></script>
</body>
</html>
